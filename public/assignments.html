<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>StudyBuddy.AI - Assignments Center</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script id="tailwind-config">
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        colors: {
          "primary": "#135bec",
          "background-light": "#f6f6f8",
          "background-dark": "#101622",
        },
        fontFamily: { "display": ["Inter"] },
        borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
      },
    },
  }
</script>
<style>
  body { font-family: 'Inter', sans-serif; }
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }

  /* Dropdown */
  .dropdown-menu {
    display: none;
    position: absolute;
    z-index: 200;
    min-width: 280px;
    background: #fff;
    border: 1px solid #e2e8f0;
    border-radius: 12px;
    box-shadow: 0 12px 32px rgba(0,0,0,0.12);
    overflow: hidden;
    top: calc(100% + 6px);
    left: 0;
  }
  .dropdown-menu.open { display: block; }
  .dropdown-section-label {
    padding: 8px 14px 4px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #94a3b8;
    background: #f8fafc;
    border-top: 1px solid #f1f5f9;
  }
  .dropdown-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    font-size: 13px;
    color: #334155;
    cursor: pointer;
    transition: background 0.15s;
    border: none;
    background: none;
    width: 100%;
    text-align: left;
  }
  .dropdown-item:hover { background: #f1f5f9; color: #135bec; }
  .dropdown-item .item-icon {
    width: 28px; height: 28px;
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; flex-shrink: 0;
  }
  .dropdown-item .item-title { font-weight: 500; line-height: 1.3; }
  .dropdown-item .item-type {
    font-size: 10px; font-weight: 600; letter-spacing: 0.05em;
    padding: 2px 6px; border-radius: 99px; margin-left: auto; flex-shrink: 0;
  }

  /* AI Modal */
  #aiModal { display: none; }
  #aiModal.open { display: flex; }
</style>
</head>

<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen">
<div class="flex flex-col min-h-screen">

<!-- NAVBAR — matches dashboard/about -->
<header class="flex items-center justify-between border-b border-slate-200 dark:border-slate-800 px-6 md:px-20 py-4 bg-white dark:bg-slate-900 sticky top-0 z-50">
  <div class="flex items-center gap-2">
    <div class="text-primary">

    </div>
    <h2 class="text-slate-900 dark:text-white text-xl font-bold tracking-tight">StudyBuddy.AI</h2>
  </div>
  <div class="flex flex-1 justify-end items-center gap-8">
    <nav class="hidden md:flex items-center gap-8">
      <a class="text-slate-600 dark:text-slate-300 text-sm font-medium hover:text-primary transition-colors" href="./dashboard.html">Dashboard</a>
      <a class="text-primary text-sm font-bold leading-normal border-b-2 border-primary pb-0.5" href="#">Assignments</a>
      <a class="text-slate-600 dark:text-slate-300 text-sm font-medium hover:text-primary transition-colors" href="./doubts.html">Doubts</a>
    </nav>
    
  </div>
</header>

<main class="max-w-7xl mx-auto w-full px-6 lg:px-20 py-10 flex-1">

  <div class="mb-10">
    <h1 class="text-4xl font-extrabold text-slate-900 dark:text-white tracking-tight">Assignments Center</h1>
    <p class="mt-2 text-slate-500 dark:text-slate-400 text-lg">Manage and analyze your assignments efficiently.</p>
  </div>

  <div id="loadingAssignments" class="flex justify-center items-center mt-10 mb-8">
    <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-primary"></div>
  </div>

  <div id="assignmentsContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>

</main>

<footer class="mt-auto border-t border-slate-200 dark:border-slate-800 py-8 px-6 lg:px-20 text-center">
  <p class="text-sm text-slate-500">StudyBuddy.AI | Empowering your learning journey.</p>
</footer>
</div>

<!-- AI Feedback Modal -->
<div id="aiModal" class="fixed inset-0 bg-black/40 items-center justify-center z-[999]">
  <div class="bg-white dark:bg-slate-800 w-[680px] max-w-[95vw] max-h-[82vh] rounded-2xl shadow-2xl flex flex-col overflow-hidden">
    <div class="flex justify-between items-center px-6 py-4 border-b border-slate-100 dark:border-slate-700">
      <div>
        <h2 class="text-lg font-bold text-slate-900 dark:text-white">AI Assignment Analysis</h2>
        <p id="aiModalSubtitle" class="text-xs text-slate-400 mt-0.5"></p>
      </div>
      <button onclick="closeModal()" class="text-slate-400 hover:text-slate-700 dark:hover:text-slate-200 transition text-2xl leading-none">&times;</button>
    </div>
    <div id="aiContent" class="px-6 py-5 text-sm text-slate-700 dark:text-slate-300 whitespace-pre-line overflow-y-auto flex-1">
      Loading AI feedback...
    </div>
  </div>
</div>

<script>
/* ============================================================
   LOAD ASSIGNMENTS
   ============================================================ */
async function loadAssignments() {
  const container = document.getElementById("assignmentsContainer");
  const loading   = document.getElementById("loadingAssignments");

  try {
    const res     = await fetch("/api/assignments");
    const classes = await res.json();

    loading.style.display = "none";
    container.innerHTML   = "";

    classes.forEach(cls => {
      let statusColor = "text-gray-500";
      if (cls.status === "Submitted") statusColor = "text-green-600";

      const dueDateHTML = cls.dueDate
        ? `<div class="text-sm text-gray-500 mb-4">${cls.dueDate}</div>`
        : "";

      const cardId = "card_" + Math.random().toString(36).slice(2);

      const card = document.createElement("div");
      card.className = "bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl p-6 shadow-sm hover:shadow-md transition";
      card.innerHTML = `
        <div class="text-xs font-semibold text-primary mb-2">${cls.className}</div>
        <div class="text-sm mb-2 ${statusColor}">${cls.status}</div>
        <div class="font-semibold text-lg mb-3 text-slate-900 dark:text-white">${cls.title}</div>
        ${dueDateHTML}
        <div class="flex gap-3 mt-4 items-center flex-wrap">
          <a href="${cls.link}" target="_blank">
            <button class="px-4 py-2 bg-primary text-white rounded-lg hover:bg-primary/90 text-sm font-semibold">View</button>
          </a>
          <div class="relative" id="${cardId}">
            <button
              class="bg-slate-100 hover:bg-slate-200 dark:bg-slate-700 dark:hover:bg-slate-600 text-sm px-3 py-2 rounded-lg font-medium flex items-center gap-1.5 transition"
              id="btn_${cardId}"
            >
              <span class="material-symbols-outlined text-base" style="font-size:16px">psychology</span>
              AI Feedback
              <span class="material-symbols-outlined text-sm" style="font-size:14px" id="chevron_${cardId}">expand_more</span>
            </button>
            <div class="dropdown-menu" id="dropdown_${cardId}">
              <div class="px-4 py-3 text-xs text-slate-400 text-center">
                <div class="animate-spin rounded-full h-4 w-4 border-b-2 border-primary mx-auto mb-1"></div>
                Loading items...
              </div>
            </div>
          </div>
        </div>
      `;

      // Attach click via addEventListener to safely pass courseId
      card.querySelector("#btn_" + cardId).addEventListener("click", (e) => {
        toggleDropdown(e, cardId, cls.courseId);
      });

      container.appendChild(card);
    });

    // Close dropdowns on outside click
    document.addEventListener("click", closeAllDropdowns);

  } catch (err) {
    console.error("Error loading assignments:", err);
    loading.innerText = "Failed to load assignments";
  }
}

loadAssignments();


/* ============================================================
   DROPDOWN LOGIC
   ============================================================ */
let openDropdownId = null;

function closeAllDropdowns(e) {
  if (openDropdownId) {
    const dd = document.getElementById("dropdown_" + openDropdownId);
    const ch = document.getElementById("chevron_" + openDropdownId);
    if (dd && !dd.parentElement.contains(e?.target)) {
      dd.classList.remove("open");
      if (ch) ch.textContent = "expand_more";
      openDropdownId = null;
    }
  }
}

async function toggleDropdown(event, cardId, courseId) {
  event.stopPropagation();
  const dd = document.getElementById("dropdown_" + cardId);
  const ch = document.getElementById("chevron_" + cardId);

  // Close previously open dropdown
  if (openDropdownId && openDropdownId !== cardId) {
    const prevDd = document.getElementById("dropdown_" + openDropdownId);
    const prevCh = document.getElementById("chevron_" + openDropdownId);
    if (prevDd) prevDd.classList.remove("open");
    if (prevCh) prevCh.textContent = "expand_more";
  }

  const isOpen = dd.classList.contains("open");
  if (isOpen) {
    dd.classList.remove("open");
    ch.textContent = "expand_more";
    openDropdownId = null;
    return;
  }

  dd.classList.add("open");
  ch.textContent = "expand_less";
  openDropdownId = cardId;

  // Only fetch items if not already loaded
  if (dd.dataset.loaded) return;
  dd.dataset.loaded = "true";

  try {
    const res = await fetch(`/api/course-items?courseId=${encodeURIComponent(courseId)}`, { credentials: "include" });
    if (!res.ok) {
      const errData = await res.json().catch(() => ({}));
      throw new Error(errData.error || `HTTP ${res.status}`);
    }
    const items = await res.json();

    if (!items || items.length === 0) {
      dd.innerHTML = `<div class="px-4 py-3 text-xs text-slate-400 text-center">No items found</div>`;
      return;
    }

    // Group by type
    const groups = { ASSIGNMENT: [], MATERIAL: [], ANNOUNCEMENT: [] };
    items.forEach(item => {
      const t = item.workType || "ASSIGNMENT";
      if (!groups[t]) groups[t] = [];
      groups[t].push(item);
    });

    const typeConfig = {
      ASSIGNMENT:   { label: "Assignments & Quizzes", icon: "assignment",     color: "bg-blue-50 text-blue-600",   badge: "bg-blue-100 text-blue-700" },
      MATERIAL:     { label: "Materials",              icon: "folder_open",    color: "bg-purple-50 text-purple-600", badge: "bg-purple-100 text-purple-700" },
      ANNOUNCEMENT: { label: "Announcements",          icon: "campaign",       color: "bg-amber-50 text-amber-600",  badge: "bg-amber-100 text-amber-700" },
    };

    dd.innerHTML = ""; // clear loading spinner
    for (const [type, typeItems] of Object.entries(groups)) {
      if (!typeItems.length) continue;
      const cfg = typeConfig[type];
      const label = document.createElement("div");
      label.className = "dropdown-section-label";
      label.textContent = cfg.label;
      dd.appendChild(label);
      typeItems.forEach(item => {
        const btn = document.createElement("button");
        btn.className = "dropdown-item";
        btn.innerHTML = `
          <div class="item-icon ${cfg.color}">
            <span class="material-symbols-outlined" style="font-size:15px">${cfg.icon}</span>
          </div>
          <span class="item-title">${item.title}</span>
          <span class="item-type ${cfg.badge}">${type}</span>
        `;
        // Use closure to safely pass values — no string escaping issues
        btn.addEventListener("click", (e) => {
          selectItem(e, courseId, item.id, type, item.title);
        });
        dd.appendChild(btn);
      });
    }

    if (!dd.querySelector(".dropdown-item")) {
      dd.innerHTML = `<div class="px-4 py-3 text-xs text-slate-400 text-center">No items found</div>`;
    }

  } catch (err) {
    console.error("Dropdown fetch error:", err);
    dd.innerHTML = `<div class="px-4 py-3 text-xs text-red-400 text-center">Error: ${err.message}</div>`;
  }
}

function selectItem(event, courseId, itemId, workType, title) {
  event.stopPropagation();
  // Close dropdown
  if (openDropdownId) {
    const dd = document.getElementById("dropdown_" + openDropdownId);
    const ch = document.getElementById("chevron_" + openDropdownId);
    if (dd) dd.classList.remove("open");
    if (ch) ch.textContent = "expand_more";
    openDropdownId = null;
  }
  aiFeedback(courseId, itemId, workType, title);
}


/* ============================================================
   AI FEEDBACK
   ============================================================ */
async function aiFeedback(courseId, courseWorkId, workType, title) {
  const modal    = document.getElementById("aiModal");
  const content  = document.getElementById("aiContent");
  const subtitle = document.getElementById("aiModalSubtitle");

  modal.classList.add("open");
  subtitle.textContent = title || "";
  content.innerText    = "Analyzing with AI...";

  try {
    const res  = await fetch("/api/ai-feedback", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ courseId, courseWorkId, workType })
    });
    const data = await res.json();
    content.innerText = data.feedback || "No feedback received.";
  } catch (err) {
    console.error(err);
    content.innerText = "Failed to analyze. Please try again.";
  }
}

function closeModal() {
  document.getElementById("aiModal").classList.remove("open");
}

// Close modal on backdrop click
document.getElementById("aiModal").addEventListener("click", function(e) {
  if (e.target === this) closeModal();
});
</script>
</body>
</html>
